name: agents-e2e-agentic

# Self-contained azd config for the AGENTIC test environment.
# Run `azd provision` from this directory (environments/agentic/).
#
# azd env new e2e-agentic
# azd provision
#
# Bicep target: infra/main.bicep (App Registration + Azure Bot + Key Vault).
# Agents still run as local subprocesses — no App Service provisioned here.

infra:
  path: infra

hooks:
  postprovision:
    windows:
      shell: pwsh
      run: scripts/postprovision.ps1
      interactive: false
  predown:
    windows:
      shell: pwsh
      run: scripts/predown.ps1
      interactive: false
