name: cd-samples
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_MINVERSION: '20'
  PYTHON_MINVERSION: '3.10'

jobs:
  check_path:
    runs-on: ubuntu-latest
    name: Check path of changed files
    outputs:
      samples_changed: ${{ steps.check_samples.outputs.samples_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check_samples
        name: Check if files in samples folder
        run: |
          ZERO_SHA='0000000000000000000000000000000000000000'

          # Get changed files
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            # For PRs, compare against base branch
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...HEAD)
          else
            # For push events, compare against previous commit
            # A zero SHA means there is no prior commit to diff against, such as branch creation.
            if [[ "${{ github.event.before }}" != "$ZERO_SHA" ]] && git rev-parse --verify "${{ github.event.before }}^{commit}" >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
            else
              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }})
            fi
          fi
          
          # Check if any files are in samples folder
          HAS_SAMPLES=false
          while IFS= read -r file; do
            if [[ "$file" == samples/* ]]; then
              HAS_SAMPLES=true
              break
            fi
          done <<< "$CHANGED_FILES"
          
          echo "samples_changed=$HAS_SAMPLES" >> $GITHUB_OUTPUT

  build-dotnet:
    needs: check_path
    if: ${{ needs.check_path.outputs.samples_changed == 'true' }}
    name: cd-samples-net
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build dotnet Samples
        working-directory: ./samples/dotnet
        run: |
          dotnet build

  build-node:
    needs: check_path
    if: ${{ needs.check_path.outputs.samples_changed == 'true' }}
    name: cd-samples-node
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # NOTE: keep first entry in sync with env.NODE_MINVERSION
        node-version: [20, 'latest']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Node dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build all Node samples
        run: |
          for dir in samples/nodejs/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "::group::Building $dir"
              (cd "$dir" && npm ci && npm run build)
              echo "::endgroup::"
            fi
          done

  build-python:
    needs: check_path
    if: ${{ needs.check_path.outputs.samples_changed == 'true' }}
    name: cd-samples-python
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # NOTE: keep first entry in sync with env.PYTHON_MINVERSION
        python-version: ['3.10', '3.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build all Python samples
        run: |
          for dir in samples/python/*/; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "::group::Building $dir"
              (cd "$dir" && pip install -r requirements.txt && python -m compileall src/ -q)
              echo "::endgroup::"
            fi
          done
